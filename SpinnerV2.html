<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel:wght@600;800&family=Lora:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a017;
    --gold-light: #f0d060;
    --gold-dark: #a07810;
    --blue: #2a6cb8;
    --blue-light: #4a90d9;
    --blue-dark: #1a4a80;
    --mahogany: #5c1a0a;
    --mahogany-light: #8b3a1a;
    --bg: #faf6ee;
    --text: #2a1a0a;
    --card-bg: rgba(255,255,255,0.85);
    --shadow: rgba(92,26,10,0.2);
    --glow: rgba(212,160,23,0.6);
  }
  html.dark {
    --bg: #0f0a04;
    --text: #f0e6d6;
    --card-bg: rgba(30,20,10,0.85);
    --shadow: rgba(0,0,0,0.5);
    --glow: rgba(212,160,23,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Cinzel', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, var(--glow) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(42,108,184,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .app-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 20px 16px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 4px var(--shadow));
    letter-spacing: 2px;
    animation: titleShimmer 3s ease-in-out infinite;
  }
  @keyframes titleShimmer {
    0%, 100% { filter: drop-shadow(0 2px 4px var(--shadow)) brightness(1); }
    50% { filter: drop-shadow(0 2px 8px var(--glow)) brightness(1.1); }
  }
  .subtitle {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    opacity: 0.7;
    margin-bottom: 20px;
    text-align: center;
  }
  .wheel-wrapper {
    position: relative;
    width: clamp(300px, 80vw, 440px);
    height: clamp(300px, 80vw, 440px);
    margin: 0 auto;
    animation: floatIn 0.8s ease-out;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: scale(0.8) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .wheel-frame {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      var(--mahogany) 0deg,
      var(--mahogany-light) 30deg,
      var(--mahogany) 60deg,
      var(--mahogany-light) 90deg,
      var(--mahogany) 120deg,
      var(--mahogany-light) 150deg,
      var(--mahogany) 180deg,
      var(--mahogany-light) 210deg,
      var(--mahogany) 240deg,
      var(--mahogany-light) 270deg,
      var(--mahogany) 300deg,
      var(--mahogany-light) 330deg,
      var(--mahogany) 360deg
    );
    box-shadow:
      0 0 30px var(--shadow),
      inset 0 0 20px rgba(0,0,0,0.4),
      0 0 60px rgba(212,160,23,0.15);
    z-index: 0;
  }
  .wheel-frame::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    opacity: 0.5;
  }
  .lights-ring {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
  }
  .light-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold-light);
    box-shadow: 0 0 6px 2px var(--gold-light), 0 0 12px 4px rgba(240,208,96,0.4);
    transform: translate(-50%, -50%);
    animation: lightPulse 1.5s ease-in-out infinite;
  }
  .light-dot:nth-child(odd) { animation-delay: 0.75s; }
  @keyframes lightPulse {
    0%, 100% { opacity: 0.4; transform: translate(-50%,-50%) scale(0.8); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
  }
  .spinning .light-dot {
    animation: lightPulseRapid 0.3s ease-in-out infinite;
  }
  .spinning .light-dot:nth-child(odd) { animation-delay: 0.15s; }
  @keyframes lightPulseRapid {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  canvas#wheelCanvas {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    cursor: pointer;
  }
  .pointer-container {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
  }
  .pointer-container svg {
    width: 40px;
    height: 50px;
  }
  .center-hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold), var(--gold-dark));
    border: 3px solid var(--mahogany);
    box-shadow: 0 0 15px var(--glow), inset 0 0 8px rgba(255,255,255,0.3);
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .center-hub::after {
    content: '';
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, var(--mahogany-light), var(--mahogany));
    border: 2px solid var(--gold);
  }
  .stand {
    width: clamp(80px, 16vw, 100px);
    height: 50px;
    margin: -8px auto 0;
    position: relative;
    z-index: 0;
  }
  .stand-neck {
    width: 30px;
    height: 28px;
    margin: 0 auto;
    background: linear-gradient(90deg, var(--mahogany), var(--mahogany-light), var(--mahogany));
    border-radius: 0 0 4px 4px;
  }
  .stand-base {
    width: 100%;
    height: 22px;
    background: linear-gradient(180deg, var(--mahogany-light), var(--mahogany));
    border-radius: 4px 4px 8px 8px;
    box-shadow: 0 4px 12px var(--shadow);
  }
  .spin-btn {
    margin-top: 24px;
    padding: 14px 48px;
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: clamp(1rem, 3vw, 1.2rem);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    border: 2px solid var(--gold-light);
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: btnPulse 2s ease-in-out infinite;
  }
  .spin-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-20deg);
    transition: left 0.6s ease;
  }
  .spin-btn:hover::before { left: 120%; }
  .spin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px var(--glow);
  }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    animation: none;
  }
  .spin-btn:disabled::before { display: none; }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 4px 20px var(--glow); }
    50% { box-shadow: 0 4px 30px var(--glow), 0 0 40px rgba(212,160,23,0.2); }
  }
  .result-panel {
    margin-top: 20px;
    padding: 0;
    text-align: center;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 100%;
  }
  .result-panel.show {
    max-height: 200px;
    opacity: 1;
    padding: 20px 24px;
  }
  .result-panel .label {
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .result-panel .prize {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(2rem, 8vw, 3rem);
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: prizeReveal 0.6s ease-out;
  }
  @keyframes prizeReveal {
    from { transform: scale(0.5); opacity: 0; }
    50% { transform: scale(1.15); }
    to { transform: scale(1); opacity: 1; }
  }
  .result-panel .prize.gift-prize {
    font-size: clamp(1.4rem, 6vw, 2.2rem);
  }
  .history {
    margin-top: 16px;
    width: 100%;
    max-width: 400px;
  }
  .history-title {
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0.5;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }
  .history-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
  }
  .history-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    background: var(--card-bg);
    border: 1px solid rgba(212,160,23,0.3);
    backdrop-filter: blur(6px);
    animation: chipIn 0.3s ease-out;
    white-space: nowrap;
  }
  @keyframes chipIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { top: 110vh; transform: rotate(720deg); }
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .modal-box {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 32px 28px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    transform: scale(0.8);
    transition: transform 0.3s ease;
    box-shadow: 0 10px 40px var(--shadow);
  }
  .modal-overlay.show .modal-box {
    transform: scale(1);
  }
  .modal-box .modal-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .modal-box .modal-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.6rem;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .modal-box .modal-text {
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    opacity: 0.8;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .modal-btn {
    padding: 10px 32px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.9rem;
    color: #fff;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.2s;
  }
  .modal-btn:hover { transform: scale(1.05); }

  @media (max-width: 360px) {
    .wheel-wrapper {
      width: 280px;
      height: 280px;
    }
  }
</style>
</head>
<body>

<div class="app-container">
  <h1>Fortune Wheel</h1>
  <p class="subtitle">Spin to win fabulous prizes</p>

  <div class="wheel-wrapper" id="wheelWrapper">
    <div class="wheel-frame"></div>
    <div class="lights-ring" id="lightsRing"></div>
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
    <div class="pointer-container">
      <svg viewBox="0 0 40 50" fill="none">
        <defs>
          <linearGradient id="ptrGrad" x1="20" y1="0" x2="20" y2="50" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0d060"/>
            <stop offset="50%" stop-color="#d4a017"/>
            <stop offset="100%" stop-color="#a07810"/>
          </linearGradient>
        </defs>
        <polygon points="20,50 6,8 20,16 34,8" fill="url(#ptrGrad)" stroke="#5c1a0a" stroke-width="1.5"/>
        <circle cx="20" cy="6" r="6" fill="#d4a017" stroke="#5c1a0a" stroke-width="1.5"/>
        <circle cx="20" cy="6" r="3" fill="#f0d060"/>
      </svg>
    </div>
    <div class="center-hub"></div>
  </div>

  <div class="stand">
    <div class="stand-neck"></div>
    <div class="stand-base"></div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin</button>

  <div class="result-panel" id="resultPanel">
    <div class="label">You won</div>
    <div class="prize" id="prizeText"></div>
  </div>

  <div class="history" id="historySection" style="display:none;">
    <div class="history-title">History</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modalIcon"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-text" id="modalText"></div>
    <button class="modal-btn" onclick="closeModal()">Collect</button>
  </div>
</div>

<script>
/* ─── Dark mode ─── */
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (e.matches) document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
});

/* ─── Segments ─── */
const segments = [
  { label: '$100',  color: '#d4a017', textColor: '#fff' },
  { label: '$200',  color: '#2a6cb8', textColor: '#fff' },
  { label: '$300',  color: '#d4a017', textColor: '#fff' },
  { label: '$400',  color: '#2a6cb8', textColor: '#fff' },
  { label: '$500',  color: '#d4a017', textColor: '#fff' },
  { label: '$600',  color: '#2a6cb8', textColor: '#fff' },
  { label: '$700',  color: '#d4a017', textColor: '#fff' },
  { label: '$800',  color: '#2a6cb8', textColor: '#fff' },
  { label: '$900',  color: '#d4a017', textColor: '#fff' },
  { label: '$1000', color: '#2a6cb8', textColor: '#fff' },
  { label: '??',    color: '#c9280a', textColor: '#fff', isHeart: true },
  { label: '??',    color: '#1f5a9e', textColor: '#fff', isGift: true },
];

const numSeg = segments.length;
const arc = (2 * Math.PI) / numSeg;
let currentAngle = 0;
let spinning = false;
const history = [];

/* ─── Lights ─── */
(function createLights() {
  const ring = document.getElementById('lightsRing');
  const count = 20;
  const rect = { w: ring.offsetWidth || 476, h: ring.offsetHeight || 476 };
  const cx = rect.w / 2, cy = rect.h / 2, r = rect.w / 2 - 2;
  for (let i = 0; i < count; i++) {
    const a = (2 * Math.PI * i) / count - Math.PI / 2;
    const dot = document.createElement('div');
    dot.className = 'light-dot';
    dot.style.left = (cx + r * Math.cos(a)) + 'px';
    dot.style.top = (cy + r * Math.sin(a)) + 'px';
    ring.appendChild(dot);
  }
})();

/* ─── Icon Helpers ─── */
function drawHeart(c, x, y, size) {
  const s = size;
  c.save();
  c.translate(x, y);
  c.beginPath();
  c.moveTo(0, s * 0.35);
  c.bezierCurveTo(-s * 0.02, s * 0.25, -s * 0.5, s * 0.05, -s * 0.5, -s * 0.2);
  c.bezierCurveTo(-s * 0.5, -s * 0.55, -s * 0.15, -s * 0.6, 0, -s * 0.35);
  c.bezierCurveTo(s * 0.15, -s * 0.6, s * 0.5, -s * 0.55, s * 0.5, -s * 0.2);
  c.bezierCurveTo(s * 0.5, s * 0.05, s * 0.02, s * 0.25, 0, s * 0.35);
  c.closePath();
  c.fillStyle = '#fff';
  c.shadowColor = 'rgba(0,0,0,0.5)';
  c.shadowBlur = 4;
  c.fill();
  c.shadowBlur = 0;
  c.strokeStyle = 'rgba(255,255,255,0.5)';
  c.lineWidth = 1;
  c.stroke();
  c.restore();
}

function drawGiftBox(c, x, y, size) {
  const s = size;
  c.save();
  c.translate(x, y);
  c.shadowColor = 'rgba(0,0,0,0.5)';
  c.shadowBlur = 4;
  /* Box body */
  c.fillStyle = '#fff';
  c.fillRect(-s * 0.4, -s * 0.15, s * 0.8, s * 0.55);
  /* Lid */
  c.fillRect(-s * 0.48, -s * 0.35, s * 0.96, s * 0.25);
  c.shadowBlur = 0;
  /* Ribbon vertical */
  c.fillStyle = '#f0d060';
  c.fillRect(-s * 0.07, -s * 0.35, s * 0.14, s * 0.75);
  /* Ribbon horizontal */
  c.fillRect(-s * 0.48, -s * 0.25, s * 0.96, s * 0.12);
  /* Bow loops */
  c.beginPath();
  c.ellipse(-s * 0.2, -s * 0.42, s * 0.16, s * 0.1, -0.3, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.ellipse(s * 0.2, -s * 0.42, s * 0.16, s * 0.1, 0.3, 0, Math.PI * 2);
  c.fill();
  /* Bow center knot */
  c.beginPath();
  c.arc(0, -s * 0.38, s * 0.07, 0, Math.PI * 2);
  c.fillStyle = '#d4a017';
  c.fill();
  c.restore();
}

/* ─── Draw Wheel ─── */
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2, R = W / 2 - 10;

function drawWheel(rotation) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  for (let i = 0; i < numSeg; i++) {
    const startA = i * arc - Math.PI / 2;
    const endA = startA + arc;
    const seg = segments[i];

    /* Segment fill */
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, startA, endA);
    ctx.closePath();

    const grad = ctx.createRadialGradient(0, 0, 20, 0, 0, R);
    const baseColor = seg.color;
    grad.addColorStop(0, lighten(baseColor, 30));
    grad.addColorStop(0.5, baseColor);
    grad.addColorStop(1, darken(baseColor, 15));
    ctx.fillStyle = grad;
    ctx.fill();

    /* Segment border */
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    /* Text */
    ctx.save();
    const midA = startA + arc / 2;
    const textR = R * 0.65;
    ctx.rotate(midA + Math.PI / 2);
    ctx.fillStyle = seg.textColor;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;

    if (seg.isHeart) {
      drawHeart(ctx, 0, -textR, Math.round(R * 0.09));
    } else if (seg.isGift) {
      drawGiftBox(ctx, 0, -textR, Math.round(R * 0.08));
    } else {
      ctx.font = `bold ${Math.round(R * 0.09)}px 'Cinzel', serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(seg.label, 0, -textR);
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  /* Inner ring decoration */
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.2, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(92,26,10,0.3)';
  ctx.fill();

  ctx.restore();
}

function lighten(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, ((num >> 16) & 0xff) + pct);
  const g = Math.min(255, ((num >> 8) & 0xff) + pct);
  const b = Math.min(255, (num & 0xff) + pct);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, ((num >> 16) & 0xff) - pct);
  const g = Math.max(0, ((num >> 8) & 0xff) - pct);
  const b = Math.max(0, (num & 0xff) - pct);
  return `rgb(${r},${g},${b})`;
}

drawWheel(currentAngle);

/* ─── Spin ─── */
function spinWheel() {
  if (spinning) return;
  spinning = true;

  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('wheelWrapper').classList.add('spinning');

  const extraSpins = 5 + Math.random() * 5;
  const targetAngle = currentAngle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 4000 + Math.random() * 2000;
  const startTime = performance.now();
  const startAngle = currentAngle;

  /* Play tick sounds if possible */
  let lastTickSegment = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    /* Ease-out cubic */
    const eased = 1 - Math.pow(1 - progress, 3);
    currentAngle = startAngle + (targetAngle - startAngle) * eased;
    drawWheel(currentAngle);

    /* Tick detection */
    const normalizedAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const currentSeg = Math.floor(((2 * Math.PI - normalizedAngle + Math.PI / 2) % (2 * Math.PI)) / arc) % numSeg;
    if (currentSeg !== lastTickSegment) {
      lastTickSegment = currentSeg;
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle % (2 * Math.PI);
      spinning = false;
      btn.disabled = false;
      document.getElementById('wheelWrapper').classList.remove('spinning');
      showResult();
    }
  }

  requestAnimationFrame(animate);
}

/* ─── Result ─── */
function showResult() {
  const normalizedAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  /* Pointer is at top (12 o'clock = -PI/2), wheel rotated clockwise */
  const pointerAngle = (2 * Math.PI - normalizedAngle + Math.PI / 2) % (2 * Math.PI);
  const winIndex = Math.floor(pointerAngle / arc) % numSeg;
  const winner = segments[winIndex];

  const panel = document.getElementById('resultPanel');
  const prizeText = document.getElementById('prizeText');
  const displayText = winner.isHeart ? '?? Bonus Love!' : winner.isGift ? '?? Mystery Gift!' : winner.label;
  prizeText.textContent = displayText;
  prizeText.className = 'prize' + ((winner.isGift || winner.isHeart) ? ' gift-prize' : '');
  panel.classList.add('show');

  /* History */
  history.unshift(displayText);
  if (history.length > 12) history.pop();
  renderHistory();

  /* Confetti */
  launchConfetti();

  /* Modal */
  setTimeout(() => showModal(winner), 600);
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = '';
  history.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'history-chip';
    chip.textContent = item;
    list.appendChild(chip);
  });
}

/* ─── Modal ─── */
function showModal(winner) {
  const modal = document.getElementById('modal');
  document.getElementById('modalIcon').textContent = winner.isHeart ? '??' : winner.isGift ? '??' : '??';
  document.getElementById('modalTitle').textContent = winner.isHeart ? 'Bonus Love!' : winner.isGift ? 'Mystery Gift!' : winner.label;
  document.getElementById('modalText').textContent = winner.isHeart
    ? 'You landed on the heart! Love and luck are on your side.'
    : winner.isGift
    ? 'You won a mystery prize! Something special awaits you.'
    : `Congratulations! You won ${winner.label}!`;
  modal.classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

/* ─── Confetti ─── */
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#d4a017', '#f0d060', '#2a6cb8', '#4a90d9', '#ff6b6b', '#fff'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.opacity = 0.8 + Math.random() * 0.2;
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 5000);
}
</script>
